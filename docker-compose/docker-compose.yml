version: '3.4'

services:
  clinics.api:
    image: ${DOCKER_REGISTRY-}clinicsapi
    build:
      context: ../Services
      dockerfile: Clinics/Clinics.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - DOTNET_HOSTBUILDER__RELOADCONFIGONCHANGE=false
    ports:
      - "5001:8080"
    restart: on-failure
    depends_on:
      clinics.migrator:
        condition: service_completed_successfully
      rabbitMQ:
        condition: service_started
      keycloak:
        condition: service_started
  
  clinics.migrator:
    image: ${DOCKER_REGISTRY-}clinicsmigrator
    build:
      context: ../Services
      dockerfile: Clinics/Clinics.Migrator/Dockerfile
    environment:

    restart: no
    depends_on:
      sqlServer:
        condition: service_healthy

  doctors.api:
    image: ${DOCKER_REGISTRY-}doctorsapi
    build:
      context: ../Services
      dockerfile: Doctors/Doctors.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - DOTNET_HOSTBUILDER__RELOADCONFIGONCHANGE=false
    ports:
      - "5002:8080"
    restart: on-failure
    depends_on:
      - sqlServer
      - rabbitMQ
      - keycloak

  timetable.api:
    image: ${DOCKER_REGISTRY-}timetableapi
    build:
      context: ../Services
      dockerfile: Timetable/Timetable.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - DOTNET_HOSTBUILDER__RELOADCONFIGONCHANGE=false
    ports:
      - "5003:8080"
    restart: on-failure
    depends_on:
      - sqlServer
      - rabbitMQ
      - keycloak
  
  sqlServer:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlServer
    environment:
      - MSSQL_SA_PASSWORD=P@ssword1
      - ACCEPT_EULA=Y
    ports:
      - "1435:1433"
    healthcheck:
      test: [
        "CMD-SHELL",
        "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P P@ssword1 -Q 'SELECT 1' || exit 1"
      ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  rabbitMQ:
    image: rabbitmq:3-management
    container_name: rabbitMq
    ports:
      - "5672:5672"
      - "15672:15672"

  micromed.bff.admin:
    image: ${DOCKER_REGISTRY-}bffadmin
    build:
      context: ..
      dockerfile: BFF/MicroMed.BFF.Admin/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - DOTNET_HOSTBUILDER__RELOADCONFIGONCHANGE=false
    ports:
      - "6001:8080"
    restart: on-failure
    depends_on:
      - doctors.api
      - clinics.api
      - timetable.api
      - keycloak

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
    volumes:
      - "./containers/keycloak:/opt/keycloak/data"
    ports:
      - "5000:8080"
