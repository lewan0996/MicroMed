version: '3.8'

# dependency graph does not work reliably with podman - dependency on migrators are thus disabled

services:
  clinics.api:
    image: ${DOCKER_REGISTRY-}clinicsapi
    build:
      context: ../Services
      dockerfile: Clinics/Clinics.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - DOTNET_HOSTBUILDER__RELOADCONFIGONCHANGE=false
    ports:
      - "5001:8080"
    restart: on-failure
    depends_on:
#      clinics.migrator:
#        condition: service_completed_successfully
      rabbitMQ:
        condition: service_started
      keycloak:
        condition: service_started
  
  clinics.migrator:
    image: ${DOCKER_REGISTRY-}clinicsdbmigrator
    build:
      context: ../Services
      dockerfile: Clinics/Clinics.DbMigrator/Dockerfile
    restart:  on-failure
    depends_on:
      sqlServer:
        condition: service_healthy

  doctors.api:
    image: ${DOCKER_REGISTRY-}doctorsapi
    build:
      context: ../Services
      dockerfile: Doctors/Doctors.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - DOTNET_HOSTBUILDER__RELOADCONFIGONCHANGE=false
    ports:
      - "5002:8080"
    restart: on-failure
    depends_on:
#      doctors.migrator:
#        condition: service_completed_successfully
      rabbitMQ:
        condition: service_started
      keycloak:
        condition: service_started
        
  doctors.migrator:
    image: ${DOCKER_REGISTRY-}doctorsdbmigrator
    build:
      context: ../Services
      dockerfile: Doctors/Doctors.DbMigrator/Dockerfile
    restart: on-failure
    depends_on:
      sqlServer:
        condition: service_healthy

  timetable.api:
    image: ${DOCKER_REGISTRY-}timetableapi
    build:
      context: ../Services
      dockerfile: Timetable/Timetable.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - DOTNET_HOSTBUILDER__RELOADCONFIGONCHANGE=false
    ports:
      - "5003:8080"
    restart: on-failure
    depends_on:
#      timetable.migrator:
#        condition: service_completed_successfully
      rabbitMQ:
        condition: service_started
      keycloak:
        condition: service_started
        
  timetable.migrator:
    image: ${DOCKER_REGISTRY-}timetabledbmigrator
    build:
      context: ../Services
      dockerfile: Timetable/Timetable.DbMigrator/Dockerfile
    restart: on-failure
    depends_on:
      sqlServer:
        condition: service_healthy
  
  sqlServer:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - MSSQL_SA_PASSWORD=P@ssword1
      - ACCEPT_EULA=Y
    ports:
      - "1435:1433"
    healthcheck:
      test: [
        "CMD-SHELL",
        "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P P@ssword1 -C -Q 'SELECT 1' || exit 1" # -C trust server cert, -Q - query
      ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  rabbitMQ:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  micromed.bff.admin:
    image: ${DOCKER_REGISTRY-}bffadmin
    build:
      context: ..
      dockerfile: BFF/MicroMed.BFF.Admin/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - DOTNET_HOSTBUILDER__RELOADCONFIGONCHANGE=false
    ports:
      - "6001:8080"
    restart: on-failure
    depends_on:
      - doctors.api
      - clinics.api
      - timetable.api
      - keycloak

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev --import-realm
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
    volumes:
      - "./containers/keycloak/import:/opt/keycloak/data/import:ro"
    ports:
      - "5000:8080"
